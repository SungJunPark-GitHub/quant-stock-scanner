<div class="top-header">
    <div class="header-left">
        <div class="app-logo">
            주식<span>분석기</span>
        </div>

        <select id="marketSelect" class="market-select">
            <option value="US" {% if market == "US" %}selected{% endif %}>🇺🇸 미국</option>
            <option value="SP500" {% if market == "SP500" %}selected{% endif %}>🇺🇸 S&P500</option>
            <option value="KR" {% if market == "KR" %}selected{% endif %}>🇰🇷 한국</option>
        </select>

        <div class="search-box">
            🔍
            <input type="text" id="stockSearchInput" placeholder="종목명 또는 티커 검색 (예: RF, 삼성, AAPL)">
        </div>

        <button class="scan-btn">🔍 스캔</button>
        <button class="more-btn">•••</button>
    </div>

    <div class="header-date">
        2026. 06. 17.
    </div>
</div>
