<div class="top-header">
    <div class="header-left">
        <div class="app-logo">
            종목<span>탐색기</span>
        </div>

        <div class="market-toggle">
            <button class="market-toggle-btn {% if market == 'US' %}active{% endif %}"
                    data-market="US"
                    type="button">
                🇺🇸 미국
            </button>
        
            <button class="market-toggle-btn {% if market == 'KR' %}active{% endif %}"
                    data-market="KR"
                    type="button">
                🇰🇷 한국
            </button>
        </div>

        <div class="search-box">
            🔍
            <input type="text" id="stockSearchInput" placeholder="종목명 또는 티커 검색 (예: 알파벳, 삼성)">
        </div>

    </div>

    <div class="header-status">
        <span>자동갱신 <strong id="autoUpdateStatus">{{ auto_update_status.task }}</strong></span>
        <div class="auto-progress hidden" id="autoUpdateProgress">
            <div class="auto-progress-track">
                <b id="autoUpdateProgressBar"></b>
            </div>
            <em id="autoUpdateProgressText">0%</em>
        </div>
    </div>

</div>
