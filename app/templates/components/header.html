<div class="top-header">
    <div class="header-left">
        <div class="app-logo">
            주식<span>분석기</span>
        </div>

        <div class="market-toggle">
            <button class="market-toggle-btn {% if market == 'US' %}active{% endif %}"
                    data-market="US"
                    type="button">
                🇺🇸 미국
            </button>
        
            <button class="market-toggle-btn {% if market == 'KR' %}active{% endif %}"
                    data-market="KR"
                    type="button">
                🇰🇷 한국
            </button>
        </div>

        <div class="search-box">
            🔍
            <input type="text" id="stockSearchInput" placeholder="종목명 또는 티커 검색 (예: RF, 삼성, AAPL)">
        </div>

        <button class="scan-btn">🔍 스캔</button>
        <button class="more-btn">•••</button>
    </div>

    <div class="header-date">
        2026. 06. 17.
    </div>
</div>
